<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>hmm...</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white overflow-hidden">

<div class="flex items-center justify-center h-screen text-center px-6">
  <div>
    
    <!-- Heart -->
    <div id="heart"
      class="mx-auto mb-8 text-2xl transition-all duration-700">
      ❤️
    </div>

    <!-- Text -->
    <p id="text"
      class="text-lg text-gray-300 max-w-md min-h-[60px] whitespace-pre-line">
      bentar ya...
    </p>

  </div>
</div>

<script>
const texts = [
  "Hallo kak Rufaidah...",
  "Apa kabar? Semoga sehat selalu yaa 😊",
  "Gimana pekerjaannya? Semoga lancar terus yaa 🙏",
  "Jadi gini...",
  "Kenapa ayam nyebrang jalan?",
  "Karena mau ke seberang… ya masa ke Indomaret 😐",
  "Hewan apa yang deket sama teman-temannya?",
  "A Crab 🦀",
  "Kenapa air mata warnanya bening?",
  "Karena kalau warnanya ijo, namanya air matcha 😂",
  "Siapa pemain bola yang beratnya 3 kg?",
  "Bambang Tabung Gas 😆",
  "Kesenian apa yang bisa dilakukan sama nasabah bank?",
  "Tari tunai 😁",
  "Oke, itu aja dulu yaa...",
  "Semoga bisa bikin senyum-senyum sendiri yaa 😄"
];

let i = 0;
let running = true;

// typing effect (FIX spasi aman)
function typeText(text, element, speed = 35, callback) {
  let index = 0;
  element.textContent = ""; // pakai textContent biar lebih aman

  function typing() {
    if (index < text.length) {
      element.textContent += text[index]; // karakter by karakter
      index++;
      setTimeout(typing, speed);
    } else {
      if (callback) callback();
    }
  }

  typing();
}

function run() {
  if (!running) return;

  const textEl = document.getElementById("text");
  const heart = document.getElementById("heart");

  if (i >= texts.length) {
    running = false;

    setTimeout(() => {
      heart.style.transition = "all 1.5s ease";
      heart.style.transform = "scale(8)";
    }, 500);

    return;
  }

  // animasi hati
  heart.style.transform = `scale(${1 + i * 0.15})`;

  // typing
  typeText(texts[i], textEl, 35, () => {
    i++;
    setTimeout(run, 2000); // lebih santai
  });
}

// start
setTimeout(run, 1000);
</script>

</body>
</html>
